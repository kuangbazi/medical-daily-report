<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医院信息化与AI每日简报 2026-05-15</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f0f2f5;
            color: #333;
            line-height: 1.7;
            font-size: 14px;
        }
        .container {
            max-width: 780px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background: linear-gradient(135deg, #1a3a6b 0%, #1565C0 50%, #1976D2 100%);
            color: #fff;
            padding: 30px 24px;
            border-radius: 12px 12px 0 0;
            position: relative;
            overflow: hidden;
        }
        .header::after {
            content: "🏥";
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 80px;
            opacity: 0.15;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .header p {
            font-size: 13px;
            opacity: 0.9;
        }
        .content {
            background: #fff;
            padding: 40px 24px;
            border-radius: 0 0 12px 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            text-align: center;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .empty-icon {
            font-size: 48px;
            margin-bottom: 20px;
            opacity: 0.6;
        }
        .empty-title {
            font-size: 18px;
            color: #1565C0;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .empty-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.8;
            max-width: 500px;
        }
        .empty-reason {
            background: #f8f9fa;
            padding: 16px 20px;
            border-radius: 8px;
            margin-top: 24px;
            text-align: left;
            font-size: 13px;
            color: #555;
        }
        .empty-reason strong {
            color: #1565C0;
        }
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>医院信息化与AI每日简报</h1>
            <p>2026年5月15日（星期五）| 佛山复星禅诚医院数字科技部</p>
        </div>

        <div class="content">
            <div class="empty-icon">📋</div>
            <div class="empty-title">本期暂停推送</div>
            <div class="empty-desc">
                白名单信源内无符合时效窗口的新增内容
            </div>
            <div class="empty-reason">
                <strong>时效窗口：</strong>2026-05-09 至 2026-05-15（D-6规则）<br>
                <strong>执行情况：</strong>已用满5次搜索额度，白名单信源（国家卫健委、健康界、HC3i、CHIMA等）内所有内容均超出时效窗口或已在近3天推送过。<br>
                <strong>严格执行白名单红线：</strong>非白名单信源内容不收录，不降级到新闻媒体转载。
            </div>
        </div>

        <div class="footer">
            📌 佛山复星禅诚医院数字科技部 | 仅供内部参考
        </div>
    </div>
</body>
</html>
