<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医院信息化与AI每日简报 | 2026-05-04</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f0f2f5;
            color: #333;
            line-height: 1.7;
            font-size: 14px;
        }
        .container {
            max-width: 780px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background: linear-gradient(135deg, #1a3a6b 0%, #1565C0 50%, #1976D2 100%);
            color: white;
            padding: 30px 24px;
            border-radius: 12px 12px 0 0;
            position: relative;
            overflow: hidden;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .header .date {
            font-size: 14px;
            opacity: 0.9;
        }
        .header .decoration {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 60px;
            opacity: 0.15;
        }
        .section {
            background: white;
            margin-bottom: 16px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .section-header {
            padding: 14px 18px;
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-header.dynamics { background: #1565C0; color: white; }
        .section-header.case { background: #2e7d32; color: white; }
        .card {
            padding: 16px 18px;
            border-bottom: 1px solid #f0f0f0;
        }
        .card:last-child { border-bottom: none; }
        .card-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.5;
        }
        .card-title a {
            color: #1565C0;
            text-decoration: none;
        }
        .card-title a:hover { text-decoration: underline; }
        .card-meta {
            font-size: 12px;
            color: #888;
            margin-bottom: 10px;
        }
        .card-meta .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 8px;
            font-size: 11px;
        }
        .card-meta .tag.blue { background: #e3f2fd; color: #1565C0; }
        .card-meta .tag.green { background: #e8f5e9; color: #2e7d32; }
        .card-summary {
            font-size: 13px;
            color: #555;
            line-height: 1.7;
        }
        .tag-new {
            display: inline-block;
            background: #ff5252;
            color: #fff;
            font-size: 11px;
            padding: 1px 6px;
            border-radius: 3px;
            margin-left: 6px;
            vertical-align: middle;
        }
        .notice-box {
            background: #fff8e1;
            border: 1px solid #ffcc80;
            border-radius: 8px;
            padding: 16px 18px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #e65100;
        }
        .footer {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>医院信息化与AI每日简报</h1>
            <div class="date">2026年5月4日 星期日</div>
            <div class="decoration">🏥</div>
        </div>

        <div class="notice-box">
            ⚠️ <strong>假期说明</strong>：五一假期期间（5月1-4日），医疗信息化行业新闻产出严重不足。经检索，符合发布窗口（4月28日及之后）且未重复推送的增量内容为0条。建议明日恢复正常工作日后查看更新内容。
        </div>

        <div class="section">
            <div class="section-header dynamics">
                📰 行业动态
            </div>
            <div class="card">
                <div class="card-summary" style="text-align: center; color: #999; padding: 20px 0;">
                    假期期间暂无新增动态<br>
                    <span style="font-size: 12px;">可回顾近3天已推送：腾讯健康数字化方案、平安医疗大模型、CHIMA 2026大会等</span>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-header case">
                🏥 标杆案例
            </div>
            <div class="card">
                <div class="card-summary" style="text-align: center; color: #999; padding: 20px 0;">
                    假期期间暂无新增标杆案例<br>
                    <span style="font-size: 12px;">建议回顾近期案例：广州复星禅诚医院蚂蚁健康示范医院、常州一院AI实验室、德适DoctorBench等</span>
                </div>
            </div>
        </div>

        <div class="footer">
            📌 佛山复星禅诚医院数字科技部 | 仅供内部参考
        </div>
    </div>
</body>
</html>
