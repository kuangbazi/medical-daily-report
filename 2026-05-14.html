<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>医院信息化与AI每日简报 2026-05-14</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      background: #f0f2f5;
      color: #222;
      font-size: 14px;
      line-height: 1.7;
    }
    .container {
      max-width: 780px;
      margin: 0 auto;
      padding: 16px 12px 40px;
    }
    .header {
      background: linear-gradient(135deg, #1a3a6b 0%, #1565C0 60%, #1976D2 100%);
      border-radius: 10px;
      padding: 22px 24px 18px;
      margin-bottom: 18px;
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .header::after {
      content: "🏥";
      position: absolute;
      right: 24px; top: 18px;
      font-size: 44px;
      opacity: 0.15;
    }
    .header .title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .header .meta {
      font-size: 12px;
      opacity: 0.82;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .header .meta span { display: flex; align-items: center; gap: 4px; }
    .section { margin-bottom: 18px; }
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-radius: 8px 8px 0 0;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
    }
    .section-header.dynamics { background: #1565C0; }
    .section-header.case { background: #2e7d32; }
    .section-header .icon { font-size: 18px; }
    .section-body {
      background: #fff;
      border-radius: 0 0 8px 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .empty-state {
      padding: 40px 24px;
      text-align: center;
      color: #666;
    }
    .empty-state h3 {
      font-size: 16px;
      color: #888;
      margin-bottom: 8px;
    }
    .empty-state p {
      font-size: 13px;
      color: #999;
      line-height: 1.6;
    }
    .footer {
      text-align: center;
      padding: 24px 12px;
      color: #888;
      font-size: 12px;
    }
    .footer .divider {
      width: 40px;
      height: 1px;
      background: #ddd;
      margin: 0 auto 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title">医院信息化与AI每日简报</div>
      <div class="meta">
        <span>📅 2026年05月14日（周四）</span>
        <span>🏥 佛山复星禅诚医院数字科技部</span>
      </div>
    </div>

    <div class="section">
      <div class="section-header dynamics">
        <span class="icon">📰</span>
        行业动态
      </div>
      <div class="section-body">
        <div class="empty-state">
          <h3>今日暂无新增行业动态</h3>
          <p>白名单信源内近7天（05-08至05-14）暂无符合时效窗口的新增内容</p>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-header case">
        <span class="icon">🏥</span>
        标杆案例
      </div>
      <div class="section-body">
        <div class="empty-state">
          <h3>今日暂无新增标杆案例</h3>
          <p>白名单信源内近7天暂无新增可收录案例</p>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="divider"></div>
      <p>📌 佛山复星禅诚医院数字科技部 | 仅供内部参考</p>
    </div>
  </div>
</body>
</html>
