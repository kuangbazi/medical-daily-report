<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医院信息化与AI每日简报 2026-05-13</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f0f2f5;
            color: #333;
            line-height: 1.7;
            font-size: 14px;
        }
        .container {
            max-width: 780px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background: linear-gradient(135deg, #1a3a6b 0%, #1565C0 50%, #1976D2 100%);
            color: white;
            padding: 30px 24px;
            border-radius: 12px 12px 0 0;
            position: relative;
            overflow: hidden;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .header .date {
            font-size: 14px;
            opacity: 0.9;
        }
        .header::after {
            content: "🏥";
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 80px;
            opacity: 0.15;
        }
        .content {
            background: white;
            padding: 30px 24px;
            border-radius: 0 0 12px 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            text-align: center;
        }
        .empty-state {
            padding: 40px 0;
        }
        .empty-state h3 {
            font-size: 18px;
            color: #666;
            margin-bottom: 16px;
        }
        .empty-state p {
            color: #999;
            font-size: 14px;
            line-height: 1.8;
        }
        .footer {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>医院信息化与AI每日简报</h1>
            <div class="date">2026年05月13日（周三）</div>
        </div>
        <div class="content">
            <div class="empty-state">
                <h3>今日暂无新增行业动态</h3>
                <p>白名单信源内无符合时效窗口（D-6至当天）的新增内容<br>近7天行业资讯持续关注中</p>
            </div>
            <div class="empty-state">
                <h3>今日暂无新增标杆案例</h3>
                <p>暂无量化学成效的新落地案例<br>持续跟踪全国标杆医院建设进展</p>
            </div>
        </div>
        <div class="footer">
            📌 佛山复星禅诚医院数字科技部 | 仅供内部参考
        </div>
    </div>
</body>
</html>
